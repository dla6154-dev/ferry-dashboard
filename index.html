<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./ferry_icon_ship.ico">
    <link rel="shortcut icon" href="./ferry_icon_ship.ico">
    <title>목포항 여객선 현황 모니터링 (실시간 항로 연동)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS for Excel import/export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <!-- Supabase JS Client for Realtime -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F0F4F8;
            overflow: hidden;
        }
        html, body, #root { height: 100%; width: 100%; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        tr { height: calc(var(--row-height, 2.5rem) * var(--ui-scale, 1)); transition: background-color 0.15s; }
        
        .dragging { 
            opacity: 0.15; 
            background-color: #f1f5f9 !important;
            filter: grayscale(1);
        }
        
        .vessel-row:hover { background-color: rgba(59, 130, 246, 0.08); }

        @keyframes slideUp {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
        .save-confirm-toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9999;
            background-color: #2563eb; color: white; padding: 12px 24px; border-radius: 9999px;
            font-weight: 900; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex; align-items: center; gap: 10px; animation: slideUp 0.5s forwards; border: 2px solid #60a5fa;
        }

        .resizable-th { position: relative; }
        .col-resizer { position: absolute; top: 0; right: -3px; width: 6px; height: 100%; cursor: col-resize; z-index: 10; }
        .col-resizer:hover { background: rgba(148, 163, 184, 0.35); }

        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }

        /* 통제(Status 1) 및 비운항(Status 2) 스타일 */
        .row-status-control td:not(.company-cell) {
            background-color: #fee2e2 !important;
            color: #991b1b !important;
        }
        .row-status-stop td:not(.company-cell) {
            background-color: #d1fae5 !important;
            color: #065f46 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useEffect, useRef } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const calculateAge = (launchDateStr) => {
            if (!launchDateStr) return { years: 0, days: 0 };
            const launchDate = new Date(launchDateStr);
            const today = new Date();
            if (isNaN(launchDate.getTime())) return { years: 0, days: 0 };

            let years = today.getFullYear() - launchDate.getFullYear();
            let lastAnniversary = new Date(launchDate);
            lastAnniversary.setFullYear(launchDate.getFullYear() + years);
            if (today < lastAnniversary) {
                years--;
                lastAnniversary = new Date(launchDate);
                lastAnniversary.setFullYear(launchDate.getFullYear() + years);
            }
            const diffTime = today.getTime() - lastAnniversary.getTime();
            const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            return { years: Math.max(0, years), days: Math.max(0, days) };
        };

        const COLUMN_LABELS = {
            company: "선사",
            name: "선명",
            route: "항로",
            tonnage: "톤수",
            capacity: "정원",
            crew: "승무정원",
            cargo: "적재량",
            cars: "차량",
            launchDate: "진수",
            speed: "속력",
            age: "선령",
            inspection: "검사만료",
            remarks: "비고"
        };

        const initialData = [
            { id: 1, company: "서진도농업협동조합", name: "가사페리호", route: "쉬미-가사", tonnage: 161.00, capacity: 50, crew: 3, cargo: 20, cars: 8, launchDate: "2018-01-01", speed: 10.0, routeType: "일반", psnshp_cd: "F122" },
            { id: 2, company: "(주)남해고속", name: "뉴돌핀호", route: "목포-홍도", tonnage: 375.00, capacity: 340, crew: 6, cargo: 0, cars: 0, launchDate: "2003-01-01", speed: 34.0, routeType: "일반", psnshp_cd: "F125" },
            { id: 3, company: "(유)해진해운", name: "뉴드림호", route: "송공-흑산", tonnage: 2103.00, capacity: 270, crew: 8, cargo: 120, cars: 30, launchDate: "2015-02-17", speed: 12.5, routeType: "일반", psnshp_cd: "F98" },
            { id: 4, company: "(주)남해고속", name: "뉴엔젤호", route: "목포-홍도", tonnage: 320.00, capacity: 337, launchDate: "2002-06-10", speed: 33.0, routeType: "일반", psnshp_cd: "F17" },
            { id: 5, company: "(주)남해고속", name: "뉴퀸", route: "목포-홍도", tonnage: 254.00, capacity: 337, launchDate: "2006-04-01", speed: 34.0, routeType: "일반", psnshp_cd: "F130" },
            { id: 6, company: "(합)대흥", name: "대흥고속카페리", route: "남강-가산", tonnage: 424.00, capacity: 350, launchDate: "2011-07-15", speed: 14.5, routeType: "일반", psnshp_cd: "F26" },
            { id: 7, company: "도초농업협동조합", name: "도초카훼리", route: "도초-목포", tonnage: 466.00, capacity: 250, launchDate: "2014-10-28", speed: 13.5, routeType: "일반", psnshp_cd: "F97" },
            { id: 8, company: "(주)동양훼리", name: "동양골드", route: "목포-홍도", tonnage: 314.00, capacity: 375, launchDate: "1996-11-01", speed: 35.0, routeType: "일반", psnshp_cd: "F20" },
            { id: 9, company: "씨월드고속훼리(주)", name: "산타모니카", route: "진도-제주", tonnage: 3321.00, capacity: 606, launchDate: "2022-01-04", speed: 42.0, routeType: "일반", psnshp_cd: "F143" },
            { id: 10, company: "서진도농업협동조합", name: "새섬두레호", route: "율목-진도", tonnage: 562.00, capacity: 300, launchDate: "2017-07-12", speed: 15.0, routeType: "일반", psnshp_cd: "F53" },
            { id: 11, company: "비금농업협동조합", name: "섬드리비금농협고속페리", route: "남강-가산", tonnage: 580.00, capacity: 290, launchDate: "2016-06-30", speed: 13.5, routeType: "일반", psnshp_cd: "F105" },
            { id: 12, company: "신안군", name: "슬로시티2호", route: "송도-병풍", tonnage: 162.00, capacity: 145, launchDate: "2001-01-22", speed: 10.0, routeType: "일반", psnshp_cd: "F112" },
            { id: 13, company: "(재)신안교통재단", name: "슬로시티3호", route: "하의-도초", tonnage: 130.00, capacity: 125, launchDate: "2014-06-17", speed: 12.0, routeType: "일반", psnshp_cd: "F127" },
            { id: 14, company: "(재)신안교통재단", name: "슬로시티5호", route: "송공-병풍", tonnage: 167.00, capacity: 184, launchDate: "2017-04-29", speed: 12.0, routeType: "일반", psnshp_cd: "F157" },
            { id: 15, company: "신안군", name: "슬로시티6호", route: "송도-병풍", tonnage: 337.00, capacity: 250, launchDate: "2024-02-28", speed: 12.0, routeType: "일반", psnshp_cd: "F167" },
            { id: 16, company: "신안군", name: "슬로시티호", route: "증도-자은", tonnage: 281.00, capacity: 150, launchDate: "2016-06-24", speed: 12.0, routeType: "일반", psnshp_cd: "F119" },
            { id: 17, company: "(유)신진해운", name: "슬로아일랜드호", route: "목포-외달", tonnage: 223.00, capacity: 160, launchDate: "2001-09-20", speed: 12.0, routeType: "일반", psnshp_cd: "F128" },
            { id: 18, company: "씨월드고속훼리(주)", name: "엔젤", route: "진도-제주", tonnage: 280.00, capacity: 170, launchDate: "2004-12-01", speed: 23.0, routeType: "일반", psnshp_cd: "F153" },
            { id: 19, company: "(유)신진해운", name: "영광사랑", route: "향화-송이", tonnage: 166.00, capacity: 146, launchDate: "2016-12-17", speed: 12.0, routeType: "일반", psnshp_cd: "F158" },
            { id: 20, company: "신안교통재단", name: "천사1호", route: "목포-상태서리", tonnage: 486.00, capacity: 357, launchDate: "2016-01-13", speed: 14.0, routeType: "일반", psnshp_cd: "F161" },
            { id: 21, company: "신안교통재단", name: "천사3호", route: "목포-상태동리", tonnage: 720.00, capacity: 429, launchDate: "2017-05-31", speed: 14.0, routeType: "일반", psnshp_cd: "F163" },
            { id: 22, company: "씨월드고속훼리(주)", name: "퀸제누비아", route: "목포-제주", tonnage: 27391.00, capacity: 1284, launchDate: "2020-03-20", speed: 22.0, routeType: "일반", psnshp_cd: "F135" },
            { id: 23, company: "씨월드고속훼리(주)", name: "퀸제누비아2", route: "목포-제주", tonnage: 26546.00, capacity: 1010, launchDate: "2021-04-27", speed: 22.7, routeType: "일반", psnshp_cd: "F151" },
            { id: 24, company: "(유)신진해운", name: "퍼스트엔젤", route: "목포-상태서리", tonnage: 170.00, capacity: 200, launchDate: "2009-01-01", speed: 23.0, routeType: "일반", psnshp_cd: "F146" },
            { id: 25, company: "(주)남해고속", name: "핑크돌핀호", route: "목포-홍도", tonnage: 223.00, capacity: 250, launchDate: "1996-06-05", speed: 30.0, routeType: "일반", psnshp_cd: "F14" },
            { id: 26, company: "(주)에이치엘해운", name: "한림페리11호", route: "진도-서거차", tonnage: 297.00, capacity: 275, launchDate: "2015-10-19", speed: 13.0, routeType: "일반", psnshp_cd: "F101" },
            { id: 27, company: "(유)해진해운", name: "해진고속카페리", route: "우수영-상태동리", tonnage: 388.00, capacity: 195, launchDate: "2003-08-01", speed: 12.0, routeType: "일반", psnshp_cd: "F152" },
        ];

        const columnMinWidths = { 
            company: 80, name: 160, route: 80, tonnage: 45, capacity: 40, 
            crew: 40, cargo: 40, cars: 40, launchDate: 50, speed: 40, remarks: 80, age: 100, inspection: 130
        };

        const GroupItem = ({ group, onEdit, onCompanyDragStart, onDragOver, onDrop, draggedItem, columnWidths, fontSizes, fontScale, uiScale, onVesselDragStart, onVesselDragOver, onVesselDrop, onStatusToggle, onRemarkChange, isEditMode, visibleColumns, totalTableWidth }) => {
            const routeCount = new Set(group.vessels.map(v => v.route)).size;
            const isAuxRoute = group.routeType === "보조";
            const companyBgClass = isAuxRoute ? "bg-emerald-900/95" : "bg-slate-900/95";
            const companyLines = (group.company || '').split(/\n|\|/).map(s => s.trim()).filter(Boolean);
            const subFontSize = Math.max(8, fontSizes.company * 0.7);

            const cellStyle = (key) => ({
                width: columnWidths[key] ? `${columnWidths[key]}px` : undefined,
                minWidth: columnWidths[key] ? `${columnWidths[key]}px` : undefined,
                maxWidth: columnWidths[key] ? `${columnWidths[key]}px` : undefined,
                fontSize: fontSizes[key] ? `${fontSizes[key] * fontScale * uiScale}px` : undefined,
                display: visibleColumns[key] ? undefined : 'none'
            });

            return (
                <div
                    onDragOver={(e) => onDragOver(e, group.key)}
                    onDrop={(e) => onDrop(e)}
                    className={`relative transition-all ${draggedItem?.type === 'company' && draggedItem?.key === group.key ? 'dragging' : ''}`}
                >
                    <table className="table-fixed" style={{width: `${totalTableWidth}px`, minWidth: `${totalTableWidth}px`}}>
                        <tbody>
                            {group.vessels.map((vessel, index) => {
                                const isLastInGroup = index === group.vessels.length - 1;
                                const age = calculateAge(vessel.launchDate);
                                const formattedDate = vessel.launchDate ? (() => {
                                    const [y, m, d] = vessel.launchDate.split("-");
                                    return `${(y || "").slice(2)}.${Number(m)}.${Number(d)}`;
                                })() : "-";

                                let ageTextColor = "text-blue-900";
                                let ageBgColor = "bg-blue-100";
                                let ageBorderColor = "border-blue-400";
                                if (age.years >= 25) { ageTextColor = "text-red-700"; ageBgColor = "bg-red-50"; ageBorderColor = "border-red-600"; }
                                else if (age.years >= 20) { ageTextColor = "text-amber-900"; ageBgColor = "bg-amber-50"; ageBorderColor = "border-amber-600"; }

                                // 검사만료 색상 계산
                                const inspectionExpiry = vessel.inspectionDate ? new Date(vessel.inspectionDate) : null;
                                const today = new Date(); today.setHours(0,0,0,0);
                                let inspectionColor = "text-slate-700";
                                let inspectionBg = "";
                                if (inspectionExpiry) {
                                    const daysLeft = Math.floor((inspectionExpiry - today) / 86400000);
                                    if (daysLeft <= 30) { inspectionColor = "text-red-700 font-black"; inspectionBg = "bg-red-50"; }
                                    else if (daysLeft <= 90) { inspectionColor = "text-amber-700 font-black"; inspectionBg = "bg-amber-50"; }
                                }
                                const inspectionText = vessel.inspectionDate
                                    ? `${vessel.inspectionDate}${vessel.inspectionType ? `(${vessel.inspectionType})` : ''}`
                                    : "-";

                                const vesselStatus = Number(vessel.status) || 0;
                                const statusClass = vesselStatus === 1 ? "row-status-control" : vesselStatus === 2 ? "row-status-stop" : "";
                                const noSpecsClass = vessel._noSpecs ? "bg-yellow-50" : "";

                                const groupBorderStyle = {
                                    ...(index === 0 ? { borderTop: '1px solid #94a3b8' } : { borderTop: '1px solid #e2e8f0' }),
                                    ...(isLastInGroup ? { borderBottom: '1px solid #94a3b8' } : {})
                                };

                                return (
                                    <tr
                                        key={vessel.id}
                                        onDragOver={(e) => onVesselDragOver(e, vessel.id, group.company, group.routeType)}
                                        onDrop={(e) => onVesselDrop(e)}
                                        className={`hover:bg-blue-50 transition-colors group vessel-row divide-x divide-slate-100 ${statusClass} ${noSpecsClass}
                                                   ${draggedItem?.type === 'vessel' && draggedItem?.id === vessel.id ? 'dragging' : ''}`}
                                        style={groupBorderStyle}
                                    >
                                        {index === 0 && visibleColumns.company && (
                                            <td
                                                rowSpan={group.vessels.length}
                                                className={`p-0.5 ${isAuxRoute ? 'bg-emerald-800' : 'bg-[#002855]'} text-white align-middle relative drag-handle company-cell`}
                                                style={cellStyle('company')}
                                                draggable
                                                onDragStart={(e) => onCompanyDragStart(e, group.key)}
                                            >
                                                <div className="h-full flex flex-col justify-center px-1 py-1">
                                                    <div className="font-black leading-tight uppercase tracking-tight text-center" style={{fontSize: `${fontSizes.company * fontScale * uiScale}px`}}>
                                                        {(companyLines.length ? companyLines : ['-']).map((line, i) => <div key={i}>{line}</div>)}
                                                    </div>
                                                    <div className="font-bold mt-2 opacity-80 leading-none text-center" style={{color: isAuxRoute ? '#a7f3d0' : '#bfdbfe', fontSize: `${subFontSize * fontScale * uiScale}px`}}>
                                                        {routeCount}항로 {group.vessels.length}척
                                                    </div>
                                                </div>
                                            </td>
                                        )}
                                        {visibleColumns.name && (
                                            <td 
                                                className="p-0.5 text-slate-900 truncate text-center font-black select-none drag-handle cursor-pointer"
                                                style={cellStyle('name')}
                                                draggable
                                                onDragStart={(e) => onVesselDragStart(e, vessel.id)}
                                                onClick={(e) => { 
                                                    e.stopPropagation();
                                                    if (isEditMode) onEdit(vessel); 
                                                    else onStatusToggle(vessel.id);
                                                }}
                                            >
                                                <div className="flex flex-col items-center">
                                                    <span>{vessel.name}</span>
                                                    <span className="flex items-center gap-1 leading-none">
                                                        {vessel.psnshp_cd && <span className="text-[9px] text-slate-400 font-mono">[{vessel.psnshp_cd}]</span>}
                                                        {vessel._noSpecs && <span className="text-[9px] text-amber-500 font-bold">제원 미등록</span>}
                                                    </span>
                                                </div>
                                            </td>
                                        )}
                                        {visibleColumns.route && (
                                            <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className="p-0.5 text-slate-500 truncate text-center leading-tight font-black uppercase italic drag-handle" style={cellStyle('route')}>
                                                {vessel.route || "-"}
                                            </td>
                                        )}
                                        {visibleColumns.tonnage && <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className="p-0.5 text-center font-mono text-slate-700 font-black drag-handle" style={cellStyle('tonnage')}>{(vessel.tonnage || 0).toLocaleString()}</td>}
                                        {visibleColumns.capacity && <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className="p-0.5 text-center font-mono text-slate-700 font-black drag-handle" style={cellStyle('capacity')}>{(vessel.capacity || 0).toLocaleString()}</td>}
                                        {visibleColumns.crew && <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className="p-0.5 text-center font-mono text-slate-700 font-black drag-handle" style={cellStyle('crew')}>{(vessel.crew || 0).toLocaleString()}</td>}
                                        {visibleColumns.cargo && <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className="p-0.5 text-center font-mono text-slate-700 font-black drag-handle" style={cellStyle('cargo')}>{(vessel.cargo || 0).toLocaleString()}</td>}
                                        {visibleColumns.cars && <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className="p-0.5 text-center font-mono text-slate-700 font-black drag-handle" style={cellStyle('cars')}>{(vessel.cars || 0).toLocaleString()}</td>}
                                        {visibleColumns.launchDate && <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className="p-0.5 text-center text-slate-400 font-mono drag-handle" style={cellStyle('launchDate')}>{formattedDate}</td>}
                                        {visibleColumns.speed && <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className="p-0.5 text-center font-mono text-slate-700 font-black drag-handle" style={cellStyle('speed')}>{(Number(vessel.speed) || 0).toFixed(1)}</td>}
                                        {visibleColumns.age && (
                                            <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className={`p-0.5 text-center font-black ${ageTextColor} drag-handle`} style={cellStyle('age')}>
                                                {age.years}년 {age.days}일
                                            </td>
                                        )}
                                        {visibleColumns.inspection && (
                                            <td draggable onDragStart={(e) => onVesselDragStart(e, vessel.id)} className="p-0.5 text-center drag-handle" style={cellStyle('inspection')}>
                                                {vessel.inspectionDate ? (() => {
                                                    const exp = new Date(vessel.inspectionDate);
                                                    const now = new Date(); now.setHours(0,0,0,0);
                                                    const days = Math.floor((exp - now) / 86400000);
                                                    const label = `${vessel.inspectionDate}${vessel.inspectionType ? `(${vessel.inspectionType})` : ''}`;
                                                    const [bg, text] = days < 0 ? ['#FEE2E2','#B91C1C'] : days <= 30 ? ['#FEE2E2','#DC2626'] : days <= 90 ? ['#FEF3C7','#B45309'] : ['#F1F5F9','#475569'];
                                                    return (
                                                        <div style={{display:'inline-flex', alignItems:'center', background:bg, color:text, borderRadius:'8px', padding:'2px 6px', fontSize:'12px', fontWeight:'700', lineHeight:'1.4', whiteSpace:'nowrap'}}>
                                                            {label}
                                                        </div>
                                                    );
                                                })() : <span className="text-slate-300">-</span>}
                                            </td>
                                        )}
                                        {visibleColumns.remarks && (
                                            <td className="p-0.5 text-left text-slate-900 truncate leading-tight font-black" style={cellStyle('remarks')}>
                                                <div className="w-full px-1 min-h-[1.5rem] flex items-center overflow-hidden whitespace-nowrap">
                                                    {isEditMode ? (

                                inspectionType: newInspectionType,
                                inspectionDate: newInspectionDate,
                            };
                        }
                        return v;
                    });
                    return changed ? next : prev;
                });
            }, [addApiLog, vesselSpecs]);

            // vesselSpecs 변경 시 vessels에 검사/항로구분 즉시 반영
            useEffect(() => {
                if (!vesselSpecs || Object.keys(vesselSpecs).length === 0) return;
                setVessels(prev => {
                    let changed = false;
                    const next = prev.map(v => {
                        const cdKey = (v.psnshp_cd || '').toString().trim().toUpperCase();
                        const s = vesselSpecs[cdKey] || {};
                        const newInspectionType = s.검사종류 || '';
                        const newInspectionDate = s.검사만료 || '';
                        const newRouteType = s.항로구분 === '보조' ? '보조' : s.항로구분 === '일반' ? '일반' : v.routeType;
                        if (v.inspectionType !== newInspectionType || v.inspectionDate !== newInspectionDate || v.routeType !== newRouteType) {
                            changed = true;
                            return { ...v, inspectionType: newInspectionType, inspectionDate: newInspectionDate, routeType: newRouteType };
                        }
                        return v;
                    });
                    return changed ? next : prev;
                });
            }, [vesselSpecs]);

            useEffect(() => {
                window.applyLiveData = applyLiveData;
                return () => {
                    if (window.applyLiveData === applyLiveData) {
                        delete window.applyLiveData;
                    }
                };
            }, [applyLiveData]);

            // 실시간 데이터 연동 (Supabase Realtime)
            useEffect(() => {
                const normalizeRow = (row) => ({
                    psnshp_cd:       row.psnshp_cd       ?? row.PSNSHP_CD  ?? "",
                    psnshp_nm:       row.psnshp_nm       ?? row.PSNSHP_NM  ?? row.name ?? "",
                    Status:          row.Status          ?? row.status      ?? "",
                    Remarks:         row.Remarks         ?? row.remarks     ?? "",
                    seawy_se_nm:     row.seawy_se_nm     ?? "",
                    Route:           row.Route           ?? row.route       ?? "",
                    shpcpn_nm:       row.shpcpn_nm       ?? "",
                    gt:              row.gt              ?? 0,
                    pasngr_pscp_cnt: row.pasngr_pscp_cnt ?? 0,
                    kdship_nm:       row.kdship_nm       ?? "",
                });

                // 초기 전체 로드
                const initialLoad = async () => {
                    const startedAt = Date.now();
                    try {
                        const res = await fetch(
                            `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=*`,
                            { headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Accept": "application/json" } }
                        );
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const rows = await res.json();
                        const data = rows.map(normalizeRow);
                        const lastSync = new Date().toLocaleString("sv-SE", { timeZone: "Asia/Seoul" }).replace("T", " ");
                        applyLiveData({ data, lastSync });
                        addApiLog("success", `초기 로드 완료 (${data.length}척)`, { source: "supabase", elapsedMs: Date.now() - startedAt });
                    } catch (err) {
                        addApiLog("error", `초기 로드 실패: ${err.message}`);
                    }
                };

                // 단일 행 업데이트 (Realtime용 - liveData 병합, vessels 개별 갱신)
                const applyRowUpdate = (row) => {
                    const newRow = normalizeRow(row);
                    const lastSync = new Date().toLocaleString("sv-SE", { timeZone: "Asia/Seoul" }).replace("T", " ");
                    setLastUpdate(lastSync);
                    // liveData 병합 업데이트
                    setLiveData(prev => {
                        const idx = prev.findIndex(r => r.psnshp_cd === newRow.psnshp_cd);
                        if (idx >= 0) { const next = [...prev]; next[idx] = newRow; return next; }
                        return [...prev, newRow];
                    });
                    // vessels 상태 업데이트
                    setVessels(prev => prev.map(v => {
                        const apiCd = (newRow.psnshp_cd || "").trim().toUpperCase();
                        const localCd = (v.psnshp_cd || "").trim().toUpperCase();
                        const apiNm = (newRow.psnshp_nm || "").trim().replace(/\s+/g,"");
                        const localNm = (v.name || "").trim().replace(/\s+/g,"");
                        if (!((localCd && apiCd === localCd) || localNm === apiNm)) return v;
                        const sLabel = (newRow.Status || "").trim();
                        const newStatus = (sLabel === "통제") ? 1 : (sLabel === "비운항") ? 2 : 0;
                        const newRemarks = (newRow.Remarks || "").trim();
                        const newRoute = (newRow.Route || "").trim();
                        return { ...v, status: newStatus, remarks: newRemarks, route: newRoute || v.route };
                    }));
                };

                initialLoad();

                // Realtime 구독
                const supabaseJs = window.supabase;
                if (!supabaseJs) {
                    addApiLog("warn", "Supabase JS 미로드 — 60초 폴링으로 대체");
                    const timer = setInterval(initialLoad, 60000);
                    return () => clearInterval(timer);
                }

                const client = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const channel = client.channel('vessel-status-rt')
                    .on('postgres_changes',
                        { event: 'INSERT', schema: 'public', table: SUPABASE_TABLE },
                        ({ new: row }) => { applyRowUpdate(row); addApiLog("success", `Realtime INSERT: ${row.psnshp_nm}`, { source: "realtime" }); }
                    )
                    .on('postgres_changes',
                        { event: 'UPDATE', schema: 'public', table: SUPABASE_TABLE },
                        ({ new: row }) => { applyRowUpdate(row); addApiLog("success", `Realtime UPDATE: ${row.psnshp_nm}`, { source: "realtime" }); }
                    )
                    .on('postgres_changes',
                        { event: 'DELETE', schema: 'public', table: SUPABASE_TABLE },
                        ({ old: row }) => {
                            setLiveData(prev => prev.filter(r => r.psnshp_cd !== row.psnshp_cd));
                            addApiLog("success", `Realtime DELETE: ${row.psnshp_cd}`, { source: "realtime" });
                        }
                    )
                    .subscribe((status) => {
                        if (status === 'SUBSCRIBED') addApiLog("success", "✅ Realtime 연결됨 — 변경 시에만 수신", { source: "realtime" });
                        else if (status === 'CHANNEL_ERROR') addApiLog("error", "Realtime 연결 오류", { source: "realtime" });
                    });

                return () => { client.removeChannel(channel); };
            }, [SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_TABLE, applyLiveData, addApiLog]);

            // ── 항로 기반 표시 모드 ────────────────────────────────────────
            const uniqueApiRoutes = useMemo(() => {
                const routes = liveData.map(v => v.Route).filter(Boolean);
                return [...new Set(routes)].sort();
            }, [liveData]);

            const displayVessels = useMemo(() => {
                if (selectedRoutes.length === 0) return vessels;
                const result = [];
                selectedRoutes.forEach(route => {
                    const apiVessels = liveData.filter(v => v.Route === route);
                    apiVessels.forEach(apiVessel => {
                        const cd = (apiVessel.psnshp_cd || '').toString().trim().toUpperCase();
                        const specs = vesselSpecs[cd];
                        // 엑셀 우선, 비어있으면 API 사용
                        const ex = (key) => specs?.[key] && specs[key] !== '' ? specs[key] : null;
                        const company   = ex('선사')    || apiVessel.shpcpn_nm  || '(미등록)';
                        const vesName   = ex('선명')    || apiVessel.psnshp_nm  || '';
                        const tonnage   = parseFloat(ex('톤수'))   || Number(apiVessel.gt)              || 0;
                        const capacity  = parseInt(ex('정원'))     || Number(apiVessel.pasngr_pscp_cnt) || 0;
                        const routeType = ex('항로구분') === '보조' ? '보조' : '일반';
                        result.push({
                            id: `api_${cd}_${route}`,
                            name: vesName,
                            company: company,
                            route: route,
                            routeType: routeType,
                            tonnage: tonnage,
                            capacity: capacity,
                            cargo: parseFloat(ex('적재량')) || 0,
                            cars: parseInt(ex('차량수'))   || 0,
                            launchDate: ex('진수일') || '',
                            speed: parseFloat(ex('속력')) || 0,
                            crew: parseInt(ex('승무원'))  || 0,
                            inspectionType: ex('검사종류') || '',
                            inspectionDate: ex('검사만료') || '',
                            Status: apiVessel.Status || '',
                            Remarks: (ex('비고') ? ex('비고') + ' ' : '') + (apiVessel.Remarks || ''),
                            remarks: (ex('비고') ? ex('비고') + ' ' : '') + (apiVessel.Remarks || ''),
                            psnshp_cd: apiVessel.psnshp_cd || '',
                            status: (() => {
                                const s = (apiVessel.Status || '').toString();
                                if (s === '통제') return 1;
                                if (s === '비운항') return 2;
                                return 0;
                            })(),
                            _noSpecs: !specs,
                        });
                    });
                });
                return result;
            }, [selectedRoutes, liveData, vesselSpecs, vessels]);

            // 통계 계산
            const statsSummary = useMemo(() => {
                const src = displayVessels;
                const normalShips = src.filter(v => (v.routeType || "일반") === "일반");
                const auxShips = src.filter(v => v.routeType === "보조");
                return {
                    totalV: src.length,
                    totalR: new Set(src.map(v => v.route)).size,
                    normalV: normalShips.length,
                    normalR: new Set(normalShips.map(v => v.route)).size,
                    auxV: auxShips.length,
                    auxR: new Set(auxShips.map(v => v.route)).size
                };
            }, [displayVessels]);

            // 회사 정렬 관리 (displayVessels 기준 - API 선사도 포함)
            useEffect(() => {
                const groupedKeys = new Set(displayVessels.map(v => `${v.company}__${v.routeType || "일반"}`));
                const currentKeys = new Set(companyOrder.map(o => o.key));
                const missing = [...groupedKeys].filter(k => !currentKeys.has(k));
                if (missing.length > 0) {
                    setCompanyOrder(prev => [...prev, ...missing.map(k => ({ key: k, monitorId: 1 }))]);
                }
            }, [displayVessels, companyOrder]);

            // 레이아웃 자동 계산
            const recalcLayout = useCallback(() => {
                if (!mainRef.current || !tableHeaderRef.current) return;
                const h = mainRef.current.offsetHeight - tableHeaderRef.current.offsetHeight - 20;
                const sourceVessels = displayVessels;
                const grouped = sourceVessels.reduce((acc, v) => {
                    const key = `${v.company}__${v.routeType || "일반"}`;
                    if (!acc[key]) acc[key] = { vessels: [] };
                    acc[key].vessels.push(v);
                    return acc;
                }, {});
                const knownInOrder = new Set(companyOrder.map(o => o.key));
                const myKeys = Object.keys(grouped).filter(k => {
                    const assigned = companyOrder.find(o => o.key === k)?.monitorId;
                    // companyOrder에 없으면 모니터1 기본값
                    return (assigned !== undefined ? assigned : 1) === monitorId;
                });
                const rows = Math.ceil(myKeys.reduce((sum, k) => sum + grouped[k].vessels.length, 0) / columnCount) || 1;
                const calculatedH = Math.max(30, Math.min(80, h / rows));
                setRowHeight(calculatedH);
                setFontScale(Math.max(1.0, Math.min(2.0, calculatedH / 32)));
            }, [displayVessels, companyOrder, monitorId, columnCount, uiScale, statsScale, headerFontScale]);

            useEffect(() => {
                recalcLayout();
                window.addEventListener('resize', recalcLayout);
                return () => window.removeEventListener('resize', recalcLayout);
            }, [recalcLayout]);

            // 드래그 앤 드롭 로직
            const moveCompanyOrder = (draggedKey, targetKey) => {
                if (draggedKey === targetKey) return;
                const now = Date.now();
                if (now - lastMoveTimeRef.current < 40) return;
                lastMoveTimeRef.current = now;
                setCompanyOrder(prev => {
                    const next = [...prev];
                    const fromIdx = next.findIndex(o => o.key === draggedKey);
                    const toIdx = next.findIndex(o => o.key === targetKey);
                    if (fromIdx === -1 || toIdx === -1) return prev;
                    const [moved] = next.splice(fromIdx, 1);
                    next.splice(toIdx, 0, moved);
                    broadcastState(vessels, next);
                    return next;
                });
            };

            const onDragStart = (e, key) => {
                const item = { type: 'company', key };
                draggedItemRef.current = item;
                setDraggedItem(item);
                e.dataTransfer.setData("itemData", JSON.stringify(item));
            };

            const onDragOver = (e, targetKey) => {
                e.preventDefault();
                const di = draggedItemRef.current;
                if (di?.type === 'company') moveCompanyOrder(di.key, targetKey);
            };

            const onVesselDragStart = (e, id, company, routeType) => {
                const item = { type: 'vessel', id, company, routeType: routeType || '일반' };
                draggedItemRef.current = item;
                setDraggedItem(item);
                e.dataTransfer.setData("itemData", JSON.stringify(item));
            };

            const onVesselDragOver = (e, targetId, targetCompany, targetRouteType) => {
                e.preventDefault();
                const di = draggedItemRef.current;
                if (!di || di.type !== 'vessel' || di.id === targetId) return;
                // 같은 선사 내에서만 이동
                if (di.company !== targetCompany || di.routeType !== (targetRouteType || '일반')) return;
                const now = Date.now();
                if (now - lastMoveTimeRef.current < 40) return;
                lastMoveTimeRef.current = now;
                const groupKey = `${targetCompany}__${targetRouteType || '일반'}`;
                setVesselOrder(prev => {
                    const groupVessels = displayVessels.filter(v => v.company === targetCompany && (v.routeType || '일반') === (targetRouteType || '일반'));
                    const currentOrder = prev[groupKey] ? [...prev[groupKey]] : groupVessels.map(v => v.id);
                    const fromIdx = currentOrder.indexOf(di.id);
                    const toIdx = currentOrder.indexOf(targetId);
                    if (fromIdx === -1 || toIdx === -1) return prev;
                    const next = [...currentOrder];
                    const [moved] = next.splice(fromIdx, 1);
                    next.splice(toIdx, 0, moved);
                    const newVesselOrder = { ...prev, [groupKey]: next };
                    localStorage.setItem('vesselOrder', JSON.stringify(newVesselOrder));
                    return newVesselOrder;
                });
            };

            const onDrop = (e) => {
                e.preventDefault();
                let data;
                try { data = JSON.parse(e.dataTransfer.getData("itemData")); } catch (err) { return; }
                if (data && data.type === 'company') {
                    setCompanyOrder(prev => {
                        const next = prev.map(o => o.key === data.key ? { ...o, monitorId } : o);
                        broadcastState(vessels, next);
                        return next;
                    });
                }
                draggedItemRef.current = null;
                setDraggedItem(null);
            };

            // 컬럼 너비 조절
            const onResizeStart = (e, key) => { e.preventDefault(); setResizing({ key, startX: e.clientX, startWidth: columnWidths[key] || 0 }); };
            useEffect(() => {
                if (!resizing) return;
                const move = (e) => setColumnWidths(prev => ({ ...prev, [resizing.key]: Math.max(columnMinWidths[resizing.key] || 30, resizing.startWidth + (e.clientX - resizing.startX)) }));
                const up = () => setResizing(null);
                window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
                return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
            }, [resizing]);

            // 수동 상태 관리
            const onStatusToggle = (id) => setVessels(prev => {
                const next = prev.map(v => v.id === id ? { ...v, status: (Number(v.status) + 1) % 3 } : v);
                broadcastState(next, companyOrder);
                return next;
            });
            
            const onRemarkChange = (id, val) => setVessels(prev => {
                const next = prev.map(v => v.id === id ? { ...v, remarks: val } : v);
                broadcastState(next, companyOrder);
                return next;
            });

            const forceSaveData = () => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ vessels, companyOrder, uiScale, columnCount, columnWidths, fontSizes, statsScale, headerFontScale, visibleColumns }));
                setShowSaveMsg(true); setTimeout(() => setShowSaveMsg(false), 2000);
            };

            const handleSaveVessel = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = { 
                    ...editingVessel, 
                    psnshp_cd: fd.get('psnshp_cd'), 
                    name: fd.get('name'), 
                    company: fd.get('company'), 
                    route: fd.get('route'), 
                    routeType: fd.get('routeType'), 
                    tonnage: Number(fd.get('tonnage')), 
                    capacity: Number(fd.get('capacity')), 
                    crew: Number(fd.get('crew')), 
                    cargo: Number(fd.get('cargo')), 
                    cars: Number(fd.get('cars')), 
                    speed: Number(fd.get('speed')), 
                    launchDate: fd.get('launchDate') 
                };
                setVessels(prev => {
                    const next = editingVessel ? prev.map(v => v.id === editingVessel.id ? data : v) : [...prev, { ...data, id: Date.now() }];
                    broadcastState(next, companyOrder);
                    return next;
                });
                setIsModalOpen(false);
            };

            const handleBulkImport = () => {
                const text = document.getElementById('bulkInput').value;
                if (!text.trim()) return;
                const lines = text.split('\n').filter(l => l.trim());
                const newOnes = lines.map((l, i) => {
                    const p = l.split(/[,\t]/).map(s => s.trim());
                    return { id: Date.now() + i, company: p[0], route: p[1], name: p[2], psnshp_cd: p[3] || "", tonnage: parseFloat(p[4]) || 0, capacity: parseInt(p[5]) || 0, launchDate: p[6], speed: parseFloat(p[7]) || 0, routeType: p[8] || "일반", crew: parseInt(p[9]) || 0, cargo: parseFloat(p[10]) || 0, cars: parseInt(p[11]) || 0, remarks: "", status: 0 };
                });
                setVessels(prev => {
                    const next = [...prev, ...newOnes];
                    broadcastState(next, companyOrder);
                    return next;
                });
                setIsBulkModalOpen(false);
            };

            const toggleColumn = (key) => {
                setVisibleColumns(prev => {
                    const next = { ...prev, [key]: !prev[key] };
                    broadcastState(vessels, companyOrder, next);
                    return next;
                });
            };

            const { columnGroups } = useMemo(() => {
                const grouped = displayVessels.reduce((acc, v) => {
                    const key = `${v.company}__${v.routeType || "일반"}`;
                    if (!acc[key]) acc[key] = { company: v.company, routeType: v.routeType || "일반", vessels: [], key };
                    acc[key].vessels.push(v);
                    return acc;
                }, {});
                // 선박 순서 적용
                for (const [key, group] of Object.entries(grouped)) {
                    const order = vesselOrder[key];
                    if (order && order.length > 0) {
                        group.vessels.sort((a, b) => {
                            const ai = order.indexOf(a.id);
                            const bi = order.indexOf(b.id);
                            if (ai === -1 && bi === -1) return 0;
                            if (ai === -1) return 1;
                            if (bi === -1) return -1;
                            return ai - bi;
                        });
                    }
                }

                // 항로 모드/일반 모드 동일하게 monitorId 필터링
                const knownKeys = new Set(companyOrder.map(o => o.key));
                const myOrderedKeys = companyOrder.filter(o => o.monitorId === monitorId && grouped[o.key]).map(o => o.key);
                // companyOrder에 아직 없는 신규 그룹은 모니터1에 기본 배정
                const newKeys = Object.keys(grouped).filter(k => !knownKeys.has(k));
                const sorted = [
                    ...myOrderedKeys.map(k => grouped[k]),
                    ...(monitorId === 1 ? newKeys.map(k => grouped[k]) : [])
                ].filter(Boolean);

                const perCol = Math.ceil(sorted.length / columnCount) || 1;
                return { columnGroups: Array.from({ length: columnCount }, (_, i) => sorted.slice(i * perCol, (i + 1) * perCol)) };
            }, [displayVessels, companyOrder, monitorId, columnCount, selectedRoutes, vesselOrder]);

            const getApiLogColorClass = (level) => {
                if (level === "success") return "text-emerald-300";
                if (level === "warn") return "text-amber-300";
                if (level === "error") return "text-red-300";
                return "text-sky-300";
            };

            const headerStyle = (key) => ({
                width: `${columnWidths[key]}px`,
                minWidth: `${columnWidths[key]}px`,
                maxWidth: `${columnWidths[key]}px`,
                fontSize: `${10 * headerFontScale}px`,
                display: visibleColumns[key] ? undefined : 'none'
            });

            const totalTableWidth = useMemo(() =>
                Object.keys(columnWidths).reduce((sum, key) =>
                    visibleColumns[key] ? sum + (columnWidths[key] || 0) : sum, 0
                ), [columnWidths, visibleColumns]);

            return (
                <div className="h-screen w-screen bg-[#F0F4F8] flex flex-col overflow-hidden select-none" onDragOver={(e) => e.preventDefault()} onDrop={onDrop} style={{"--ui-scale": uiScale}}>
                    {showSaveMsg && <div className="save-confirm-toast"><Icon name="check-circle" size={20} /> 모든 설정이 저장되었습니다.</div>}

                    {/* ── 헤더: 그라디언트 ── */}
                    <header className="bg-gradient-to-r from-[#002855] via-[#003F88] to-[#0062C5] text-white px-6 py-3 flex items-center justify-between shadow-lg z-10 shrink-0">
                        <div className="flex items-center gap-5">
                            <div className="shrink-0 bg-white rounded-full p-0.5 shadow-md" style={{height: '48px', width: '48px'}}>
                                <img src="KOMSA-원형01_배경투명.png" alt="KOMSA" style={{height: '100%', width: '100%', objectFit: 'contain'}} />
                            </div>
                            <div>
                                <div className="font-black tracking-widest leading-none" style={{fontSize: `${Math.round(18 * statsScale)}px`}}>여객선 현황판</div>
                                <div className="text-blue-200 font-bold tracking-[0.25em] mt-0.5" style={{fontSize: '9px'}}>MARITIME MONITORING</div>
                            </div>
                            <div className="h-8 w-px bg-white/20 mx-2"></div>
                            <div className="flex items-center gap-5" style={{fontSize: `${Math.round(14 * statsScale)}px`}}>
                                <div className="flex items-center gap-2">
                                    <span className="text-blue-200 font-medium">일반:</span>
                                    <span className="text-sky-300 font-black">{statsSummary.normalR}항로 {statsSummary.normalV}척</span>
                                </div>
                                <div className="flex items-center gap-2 border-l border-white/20 pl-5">
                                    <span className="text-blue-200 font-medium">보조:</span>
                                    <span className="text-emerald-300 font-black">{statsSummary.auxR}항로 {statsSummary.auxV}척</span>
                                </div>
                                <div className="flex items-center gap-2 border-l border-white/20 pl-5">
                                    <span className="text-blue-200 font-medium">합계:</span>
                                    <span className="text-white font-black">{statsSummary.totalR}항로 {statsSummary.totalV}척</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="bg-black/20 px-3 py-1.5 rounded-full text-xs font-mono flex items-center gap-2 border border-white/10">

                                        <label className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg font-black text-sm flex items-center justify-center gap-2 cursor-pointer shadow-md transition-all">
                                            <Icon name="upload" size={16}/> 설정 파일 불러오기
                                            <input type="file" accept=".json" className="hidden" onChange={(e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const parsed = JSON.parse(ev.target.result); setVessels(parsed.vessels); setCompanyOrder(parsed.companyOrder); if(parsed.statsScale) setStatsScale(parsed.statsScale); if(parsed.headerFontScale) setHeaderFontScale(parsed.headerFontScale); if(parsed.uiScale) setUiScale(parsed.uiScale); setVisibleColumns(parsed.visibleColumns || visibleColumns); alert("복구 성공. [전체 저장]을 눌러주세요."); } catch (err) { alert("잘못된 파일입니다."); } }; reader.readAsText(file); }} />
                                        </label>
                                    </div>
                                </div>
                                <div className="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end shrink-0">
                                    <button onClick={() => setShowSettings(false)} className="px-6 py-2 bg-[#002855] hover:bg-[#003F88] text-white rounded-lg text-sm font-black transition-colors">
                                        닫기
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showRouteSelector && (
                        <div className="fixed inset-0 bg-black/70 z-[120] flex items-center justify-center p-4" onClick={() => setShowRouteSelector(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="bg-indigo-700 px-6 py-4 text-white flex items-center justify-between">
                                    <div className="font-black tracking-wider text-sm flex items-center gap-2">
                                        <Icon name="route" size={16}/> API 항로 선택
                                    </div>
                                    <button onClick={() => setShowRouteSelector(false)} className="text-white/70 hover:text-white transition-colors">
                                        <Icon name="x" size={18}/>
                                    </button>
                                </div>
                                <div className="p-5">
                                    <div className="flex gap-2 mb-4">
                                        <button
                                            onClick={() => setSelectedRoutes([...uniqueApiRoutes])}
                                            className="flex-1 py-2 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 rounded-lg text-sm font-black transition-colors"
                                        >전체 선택</button>
                                        <button
                                            onClick={() => setSelectedRoutes([])}
                                            className="flex-1 py-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 rounded-lg text-sm font-black transition-colors"
                                        >전체 해제</button>
                                    </div>
                                    {uniqueApiRoutes.length === 0 ? (
                                        <div className="text-center py-8 text-slate-400 text-sm">
                                            <Icon name="wifi-off" size={32} className="mx-auto mb-2 opacity-40"/>
                                            <div>API 데이터를 수신하면 항로 목록이 표시됩니다.</div>
                                        </div>
                                    ) : (
                                        <div className="max-h-64 overflow-y-auto space-y-1">
                                            {uniqueApiRoutes.map(route => {
                                                const checked = selectedRoutes.includes(route);
                                                const vesselCount = liveData.filter(v => v.Route === route).length;
                                                return (
                                                    <button
                                                        key={route}
                                                        onClick={() => {
                                                            setSelectedRoutes(prev =>
                                                                prev.includes(route)
                                                                    ? prev.filter(r => r !== route)
                                                                    : [...prev, route]
                                                            );
                                                        }}
                                                        className={`w-full flex items-center justify-between px-4 py-2.5 rounded-lg border text-sm font-bold transition-all ${checked ? 'bg-indigo-50 border-indigo-300 text-indigo-800' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}`}
                                                    >
                                                        <div className="flex items-center gap-3">
                                                            <div className={`w-4 h-4 rounded border-2 flex items-center justify-center flex-shrink-0 ${checked ? 'bg-indigo-600 border-indigo-600' : 'border-slate-300'}`}>
                                                                {checked && <Icon name="check" size={10} className="text-white"/>}
                                                            </div>
                                                            <span>{route}</span>
                                                        </div>
                                                        <span className={`text-xs px-2 py-0.5 rounded-full ${checked ? 'bg-indigo-200 text-indigo-700' : 'bg-slate-200 text-slate-500'}`}>{vesselCount}척</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                                <div className="px-5 pb-5 flex gap-2">
                                    <button
                                        onClick={() => setShowRouteSelector(false)}
                                        className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-sm font-black transition-colors"
                                    >취소</button>
                                    <button
                                        onClick={() => {
                                            localStorage.setItem('selectedRoutes', JSON.stringify(selectedRoutes));
                                            setShowRouteSelector(false);
                                        }}
                                        className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-black transition-colors"
                                    >저장 및 적용</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isBulkModalOpen && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl w-full max-w-2xl h-4/5 flex flex-col shadow-2xl overflow-hidden">
                                <div className="bg-indigo-700 p-4 text-white flex justify-between font-black uppercase tracking-widest">
                                    <h3>일괄 데이터 등록</h3>
                                    <button onClick={() => setIsBulkModalOpen(false)}><Icon name="x" size={24}/></button>
                                </div>
                                <div className="p-4 flex-1 flex flex-col gap-4 overflow-hidden">
                                    <textarea id="bulkInput" className="flex-1 w-full bg-slate-50 border-2 rounded-xl p-4 text-sm font-mono outline-none" placeholder="탭 또는 쉼표 구분: 선사, 항로, 선명, 선박코드, 톤수, 정원, 진수일, 속력, 구분, 승무원, 적재량, 차량..."></textarea>
                                    <button onClick={handleBulkImport} className="bg-indigo-600 text-white font-black py-4 rounded-xl text-lg shadow-xl active:scale-95 transition-all">반영하기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4" onClick={() => setIsModalOpen(false)}>
                            <form onSubmit={handleSaveVessel} onClick={e => e.stopPropagation()} className="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden font-bold text-slate-800">
                                <div className="bg-slate-900 p-4 text-white flex justify-between font-black border-b-4 border-blue-600 uppercase">
                                    <h3>{editingVessel ? "선박 제원 상세 수정" : "새 선박 추가"}</h3>
                                    <button type="button" onClick={() => setIsModalOpen(false)}><Icon name="x" size={24}/></button>
                                </div>
                                <div className="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
                                    <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black uppercase">선사명</label><input name="company" defaultValue={editingVessel?.company} required className="w-full border-b py-1 text-lg font-black outline-none" /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">선명</label><input name="name" defaultValue={editingVessel?.name} required className="w-full border-b py-1 outline-none" /></div>
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">선박 코드</label><input name="psnshp_cd" defaultValue={editingVessel?.psnshp_cd} className="w-full border-b py-1 outline-none font-mono text-blue-600" /></div>
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">항로</label><input name="route" defaultValue={editingVessel?.route} required className="w-full border-b py-1 outline-none" /></div>
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">구분</label><select name="routeType" defaultValue={editingVessel?.routeType || "일반"} className="w-full border-b py-1 outline-none"><option value="일반">일반</option><option value="보조">보조</option></select></div>
                                    </div>
                                    <div className="grid grid-cols-3 gap-4 bg-slate-50 p-3 rounded-lg border border-slate-100">
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">톤수</label><input name="tonnage" type="number" step="0.1" defaultValue={editingVessel?.tonnage} className="w-full border-b py-1 outline-none bg-transparent" /></div>
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">정원</label><input name="capacity" type="number" defaultValue={editingVessel?.capacity} className="w-full border-b py-1 outline-none bg-transparent" /></div>
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">승무원</label><input name="crew" type="number" defaultValue={editingVessel?.crew} className="w-full border-b py-1 outline-none bg-transparent" /></div>
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">적재량</label><input name="cargo" type="number" step="0.1" defaultValue={editingVessel?.cargo} className="w-full border-b py-1 outline-none bg-transparent" /></div>
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">차량</label><input name="cars" type="number" defaultValue={editingVessel?.cars} className="w-full border-b py-1 outline-none bg-transparent" /></div>
                                        <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">속력</label><input name="speed" type="number" step="0.1" defaultValue={editingVessel?.speed} className="w-full border-b py-1 outline-none bg-transparent" /></div>
                                    </div>
                                    <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">진수일</label><input name="launchDate" type="date" defaultValue={editingVessel?.launchDate} required className="w-full border-b py-1 outline-none text-sm" /></div>
                                    <div className="space-y-1"><label className="text-[10px] text-slate-400 font-black">비고</label><input name="remarks" defaultValue={editingVessel?.remarks || ""} className="w-full border-b py-1 outline-none" /></div>
                                    <div className="flex gap-2 pt-2">
                                        {editingVessel && (
                                            <button type="button" onClick={() => { if(confirm("삭제하시겠습니까?")) { const next = vessels.filter(v => v.id !== editingVessel.id); setVessels(next); broadcastState(next, companyOrder); setIsModalOpen(false); } }} className="px-4 py-3 rounded-xl bg-red-50 text-red-600 font-black border-2 border-red-100 transition-all"><Icon name="trash-2" size={18} /></button>
                                        )}
                                        <button type="submit" className="flex-1 bg-blue-600 text-white font-black py-3 rounded-xl text-lg shadow-xl active:scale-95 transition-all">저장 및 적용</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
  window.addEventListener("liveDataUpdated", () => {
    // window.latestVesselData 값을 반영하는 코드가 이미 있다면 자동으로 갱신됨
    // 없으면 아래처럼 직접 갱신 함수 호출을 넣어줄 수 있음
    if (window.applyLiveData) window.applyLiveData(window.latestVesselData);
  });
</script>
</body>
</html>
